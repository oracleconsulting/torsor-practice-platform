name: Deploy Supabase Edge Functions

# Auto-deploys edge functions whose folders changed on push to main. Changes
# anywhere under supabase/functions/_shared/ trigger a redeploy of every
# function that imports a shared module.
#
# Required secret:
#   - SUPABASE_ACCESS_TOKEN (account-level access token, not the service role
#     key). Generate at https://supabase.com/dashboard/account/tokens and add
#     via Repo Settings -> Secrets -> Actions.
#
# Optional secret / variable:
#   - SUPABASE_PROJECT_REF (defaults to mvdejlkiqslwrbarwxkw if unset).

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'
      - 'supabase/config.toml'
      - '.github/workflows/deploy-edge-functions.yml'
  workflow_dispatch:
    inputs:
      mode:
        description: 'What to deploy'
        type: choice
        options:
          - changed
          - all
        default: changed
      functions:
        description: 'Optional comma-separated list of function names (overrides mode)'
        required: false
        default: ''

permissions:
  contents: read

concurrency:
  group: deploy-edge-functions
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy edge functions
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need at least 2 commits so we can diff HEAD~1..HEAD on push events.
          fetch-depth: 0

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Resolve which functions to deploy
        id: resolve
        env:
          MODE: ${{ github.event.inputs.mode || 'changed' }}
          MANUAL_FUNCTIONS: ${{ github.event.inputs.functions }}
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          collect_changed() {
            local diff_paths=""
            if [[ "$EVENT_NAME" == "push" ]]; then
              if [[ -n "${BEFORE_SHA:-}" && "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]]; then
                diff_paths=$(git diff --name-only "$BEFORE_SHA"..."$AFTER_SHA" || true)
              else
                diff_paths=$(git diff --name-only "${AFTER_SHA}^...${AFTER_SHA}" || true)
              fi
            else
              diff_paths=$(git diff --name-only HEAD~1...HEAD || true)
            fi
            echo "$diff_paths"
          }

          fns=()
          if [[ -n "$MANUAL_FUNCTIONS" ]]; then
            IFS=',' read -ra fns <<< "$MANUAL_FUNCTIONS"
          elif [[ "$MODE" == "all" ]]; then
            while IFS= read -r d; do
              name=$(basename "$d")
              [[ -f "$d/index.ts" ]] && fns+=("$name")
            done < <(find supabase/functions -mindepth 1 -maxdepth 1 -type d ! -name '_*' | sort)
          else
            paths=$(collect_changed)
            echo "Changed paths:"
            echo "$paths" | sed 's/^/  /'
            echo

            if echo "$paths" | grep -q '^supabase/functions/_shared/' \
               || echo "$paths" | grep -q '^supabase/config.toml$' \
               || echo "$paths" | grep -q '^\.github/workflows/deploy-edge-functions.yml$'; then
              echo "_shared/, config.toml, or workflow change detected — deploying all functions that import a shared module."
              while IFS= read -r d; do
                name=$(basename "$d")
                if [[ -f "$d/index.ts" ]] && grep -q "_shared/" "$d/index.ts"; then
                  fns+=("$name")
                fi
              done < <(find supabase/functions -mindepth 1 -maxdepth 1 -type d ! -name '_*' | sort)
            fi

            while IFS= read -r path; do
              [[ -z "$path" ]] && continue
              if [[ "$path" =~ ^supabase/functions/([^/]+)/ ]]; then
                name="${BASH_REMATCH[1]}"
                [[ "$name" == _* ]] && continue
                [[ ! -f "supabase/functions/$name/index.ts" ]] && continue
                fns+=("$name")
              fi
            done <<< "$paths"
          fi

          # Trim, de-dup, sort
          if [[ ${#fns[@]} -gt 0 ]]; then
            mapfile -t fns < <(printf '%s\n' "${fns[@]}" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | grep -v '^$' | sort -u)
          fi

          echo "Resolved ${#fns[@]} function(s):"
          printf '  - %s\n' "${fns[@]}"

          # Multi-line output
          {
            echo "functions<<EOF"
            printf '%s\n' "${fns[@]}"
            echo "EOF"
            echo "count=${#fns[@]}"
          } >> "$GITHUB_OUTPUT"

      - name: Strip max_execution_time from config.toml
        if: steps.resolve.outputs.count != '0'
        run: |
          cp supabase/config.toml supabase/config.toml.bak
          sed -i '/^max_execution_time/d' supabase/config.toml
          echo "Stripped max_execution_time keys (CLI rejects them)."

      - name: Deploy
        if: steps.resolve.outputs.count != '0'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF || 'mvdejlkiqslwrbarwxkw' }}
        run: |
          set -euo pipefail
          if [[ -z "${SUPABASE_ACCESS_TOKEN:-}" ]]; then
            echo "::error::SUPABASE_ACCESS_TOKEN secret not set on this repo."
            exit 1
          fi

          # Diagnostics — non-sensitive info to help debug "Invalid access token
          # format" errors without revealing the secret. Length and prefix are
          # both safe to log; the body is masked elsewhere.
          token_len=${#SUPABASE_ACCESS_TOKEN}
          token_prefix="${SUPABASE_ACCESS_TOKEN:0:4}"
          # Strip any whitespace / control characters we somehow inherited so
          # the deploy itself can succeed even when the stored secret was
          # contaminated. Non-destructive: only sanitises the env var for this
          # step, doesn't change the GitHub secret.
          clean_token=$(printf '%s' "$SUPABASE_ACCESS_TOKEN" | tr -d '[:space:][:cntrl:]')
          clean_len=${#clean_token}

          echo "Token length: $token_len"
          echo "Cleaned length: $clean_len"
          echo "Prefix: $token_prefix"

          if [[ "$token_len" -ne "$clean_len" ]]; then
            echo "::warning::Stored token contained $((token_len - clean_len)) whitespace/control chars. Auto-stripped for this run; please re-run the local setup script to fix the stored secret."
          fi

          if [[ ! "$clean_token" =~ ^sbp_[a-zA-Z0-9]+$ ]]; then
            echo "::error::SUPABASE_ACCESS_TOKEN does not match the expected sbp_<hex> format. Length after cleaning: $clean_len."
            exit 1
          fi

          # Use the cleaned token for the rest of this step
          export SUPABASE_ACCESS_TOKEN="$clean_token"

          failed=()
          while IFS= read -r fn; do
            [[ -z "$fn" ]] && continue
            echo "::group::Deploying $fn"
            if supabase functions deploy "$fn" --project-ref "$SUPABASE_PROJECT_REF"; then
              echo "::notice::Deployed $fn"
            else
              echo "::error::Failed to deploy $fn"
              failed+=("$fn")
            fi
            echo "::endgroup::"
          done <<< "${{ steps.resolve.outputs.functions }}"

          if [[ ${#failed[@]} -gt 0 ]]; then
            echo "::error::Failed deploys: ${failed[*]}"
            exit 1
          fi

      - name: Restore config.toml
        if: always() && steps.resolve.outputs.count != '0'
        run: |
          if [[ -f supabase/config.toml.bak ]]; then
            mv -f supabase/config.toml.bak supabase/config.toml
          fi

      - name: Skipped
        if: steps.resolve.outputs.count == '0'
        run: echo "No edge functions to deploy."
